# WebSphere Portal Application Properties

# Database Configuration
db.url=jdbc:postgresql://localhost:5432/portal_db
db.user=portal_user
db.password=secure_password
db.driver=org.postgresql.Driver

# File Storage
storage.path=/var/portal/documents
storage.max.size=52428800

# Notification Service
notification.endpoint=http://localhost:8080/notifications
notification.timeout=5000

# Cache Configuration
cache.enabled=true
cache.ttl=300
cache.max.size=1000

# Application Settings
app.name=WebSphere Portal
app.version=2.0
app.environment=production

# Portal Configuration
portal.refresh.interval=60
portal.page.size=10
portal.max.uploads=100

# Logging
logging.level=INFO
logging.file=/var/log/portal/application.log

# Session Configuration
session.timeout=1800
session.secure=true
session.httponly=true

# Report Configuration
report.export.formats=PDF,EXCEL,CSV
report.generation.timeout=30000
report.cache.enabled=true
