# ============================================================
# Production Docker Compose for Code Graph RAG Rust
# ============================================================
# Services:
#   - code-continuum: Rust analyzer (on-demand execution)
#   - neo4j: Graph database (persistent storage)
#   - mcp-neo4j: Neo4j MCP server (Cypher queries)
#   - mcp-code-continuum: code-continuum MCP server (project management)
# 
# Usage:
#   cd production
#   cp .env.example .env
#   docker compose up -d neo4j mcp-neo4j mcp-code-continuum
#   
# MCP endpoints (localhost):
#   - http://localhost:8040/api/mcp/ (Neo4j queries)
#   - http://localhost:8041/api/mcp/ (Code analysis)
# ============================================================

services:
  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.15
    container_name: code-continuum-neo4j-prod
    restart: unless-stopped
    ports:
      - "7474:7474"  # Neo4j Browser
      - "7687:7687"  # Bolt protocol
    environment:
      NEO4J_PLUGINS: '["apoc"]'  # Install APOC plugin
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-production_password_change_me}
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_trigger_enabled: "true"
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 2G
    volumes:
      - neo4j-data-prod:/data
      - neo4j-logs-prod:/logs
      - neo4j-import-prod:/var/lib/neo4j/import
    networks:
      - code-continuum-network
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-production_password_change_me} 'RETURN 1' || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 90s

  # Code Graph RAG Analyzer
  code-continuum:
    build:
      context: ../
      dockerfile: Dockerfile
    image: code-continuum:latest
    container_name: code-continuum-analyzer-prod
    restart: on-failure
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-production_password_change_me}
      - RUST_LOG=${RUST_LOG:-info}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-0}
    volumes:
      # Mount your codebase here
      - ${CODE_PATH:-./examples}:/app/data:ro
    networks:
      - code-continuum-network
    depends_on:
      neo4j:
        condition: service_healthy
    # Override default CMD to analyze mounted directory
    command: ["/app/data"]

  # MCP Server Neo4j (Model Context Protocol) - Cypher queries
  mcp-neo4j:
    image: mcp/neo4j-cypher:latest
    container_name: code-continuum-mcp-prod
    restart: unless-stopped
    ports:
      - "8040:8020"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-production_password_change_me}
      - NEO4J_DATABASE=neo4j
      - NEO4J_TRANSPORT=http
      - NEO4J_MCP_SERVER_HOST=0.0.0.0
      - NEO4J_MCP_SERVER_PORT=8020
      - NEO4J_MCP_SERVER_PATH=/api/mcp/
      - NEO4J_NAMESPACE=local
    networks:
      - code-continuum-network
    depends_on:
      neo4j:
        condition: service_healthy

  # MCP Server code-continuum - project management
  mcp-code-continuum:
    build:
      context: ../
      dockerfile: Dockerfile
    image: code-continuum:latest
    container_name: code-continuum-mcp-cc
    restart: unless-stopped
    ports:
      - "8041:8021"
    environment:
      - NEO4J_URI=bolt://neo4j:7707
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-production_password_change_me}
      - MCP_PORT=8021
      - RUST_LOG=${RUST_LOG:-warn}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-0}
    volumes:
      - ${CODE_PATH:-./examples}:/app/data:ro
    networks:
      - code-continuum-network
    depends_on:
      neo4j:
        condition: service_healthy
    command: ["--mcp"]

networks:
  code-continuum-network:
    driver: bridge

volumes:
  neo4j-data-prod:
    driver: local
  neo4j-logs-prod:
    driver: local
  neo4j-import-prod:
    driver: local
  neo4j-plugins-prod:
    driver: local
